<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Cutest Mom ❤️</title>

<style>
body {
  margin: 0;
  background: #f5e6c8;
  font-family: 'Georgia', serif;
  text-align: center;
  overflow: hidden;
}

/* Button */
button {
  margin-top: 60px;
  padding: 15px 30px;
  font-size: 30px;
  background: #8b5e3c;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* Letter box */
.letter {
  display: none;
  width: 85%;
  max-width: 550px;
  margin: 40px auto;
  padding: 30px;
  background: #fff8dc;
  border: 2px solid #d2b48c;
  box-shadow: 0 0 25px rgba(0,0,0,0.3);
  border-radius: 12px;
  text-align: left;
  font-size: 25px;
  line-height: 1.7;
}

/* Text */
#message {
  white-space: pre-wrap;
}

/* Floating emojis */
.emoji {
  position: fixed;
  top: -50px;
  font-size: 24px;
  animation: fall 6s linear;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
  }
}
</style>
</head>

<body>

<button onclick="openLetter()">Open Letter 💌</button>

<div id="letter" class="letter">
  <p id="message"></p>
</div>

<script>
let text = "Dear Mom 🫀\n\nThank you for everything you do for me...\nI love you sooo much 🤗\n\nI may not say it every day, but you mean everything to me 💖\n(Nenu every day ila chepakapovachu, but you are everything naaku)\n\nI WANNA BE YOUR SON IN MY EVERY BIRTH MAA 🫂";

let i = 0;

function openLetter() {
  document.getElementById("letter").style.display = "block";
  typeWriter();
  setInterval(createEmoji, 300);
}

function typeWriter() {
  if (i < text.length) {
    document.getElementById("message").innerHTML += 
      text.charAt(i) === "\n" ? "<br>" : text.charAt(i);
    i++;
    setTimeout(typeWriter, 40);
  }
}

function createEmoji() {
  let emoji = document.createElement("div");
  emoji.className = "emoji";
  emoji.innerHTML = Math.random() > 0.5 ? "❤️" : "🤗";

  emoji.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(emoji);

  setTimeout(() => emoji.remove(), 6000);
}
</script>

</body>
</html>
